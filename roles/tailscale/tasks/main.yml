---
- name: Create tailscale state directory
  become: true
  ansible.builtin.file:
    path: "{{ tailscale_state_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Deploy tailscale Quadlet container file
  become: true
  ansible.builtin.template:
    src: tailscale.container.j2
    dest: /etc/containers/systemd/tailscale.container
    owner: root
    group: root
    mode: "0644"
  notify: Restart tailscale

- name: Enable and start tailscale service
  become: true
  ansible.builtin.systemd_service:
    name: tailscale
    enabled: true
    state: started
    daemon_reload: true
