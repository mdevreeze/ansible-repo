---
- name: Pull latest claude-code image
  become: true
  containers.podman.podman_image:
    name: "{{ claude_code_image }}:{{ claude_code_version }}"
    force: true
  notify: Restart claude-code

- name: Create claude-code config directory
  become: true
  ansible.builtin.file:
    path: /etc/claude-code
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Deploy API key env file
  become: true
  ansible.builtin.template:
    src: env.j2
    dest: "{{ claude_code_env_file }}"
    owner: root
    group: root
    mode: "0600"
  notify: Restart claude-code

- name: Deploy claude-code Quadlet container file
  become: true
  ansible.builtin.template:
    src: claude-code.container.j2
    dest: /etc/containers/systemd/claude-code.container
    owner: root
    group: root
    mode: "0644"
  notify: Restart claude-code

- name: Enable claude-code service
  become: true
  ansible.builtin.systemd_service:
    name: claude-code
    enabled: true
    state: started
    daemon_reload: true
